<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Location - SudanFoodConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <header class="bg-green-600 text-white p-4 text-center text-2xl font-bold">
 
  </header>

  <!-- Form -->
  <form
    id="locationForm"
    class="max-w-xl mx-auto mt-6 bg-white p-6 rounded-lg shadow-md space-y-4"
  >
    <input
      type="text"
      placeholder="Location Name"
      name="name"
      class="w-full p-3 border border-gray-300 rounded-lg"
      required
    />
    <input
      type="text"
      placeholder="City / Area"
      name="city"
      class="w-full p-3 border border-gray-300 rounded-lg"
      required
    />
    <input
      type="text"
      placeholder="Coordinates (Lat, Lng)"
      name="coordinates"
      class="w-full p-3 border border-gray-300 rounded-lg"
      required
    />
    <textarea
      placeholder="Description (optional)"
      name="description"
      class="w-full p-3 border border-gray-300 rounded-lg"
    ></textarea>
    <button
      type="submit"
      class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700"
    >
      Submit Location
    </button>
  </form>

<!--back link to the main website, you wna update as required or save tis in same folder-->
  <div class="text-center mt-4">
    <a href="index.html" class="text-green-600 hover:underline">
      ← Back to Map
    </a>
  </div>

<script>
  document.getElementById('locationForm').addEventListener('submit', function (e) {
    e.preventDefault();


    const name = this.name.value;
    const city = this.city.value;
    const coordinates = this.coordinates.value;
    const description = this.description.value;


    const [lat, lng] = coordinates.split(',').map(coord => parseFloat(coord.trim()));


    if (isNaN(lat) || isNaN(lng)) {
      alert('Invalid coordinates!');
      return;
    }


    const existing = JSON.parse(localStorage.getItem('locations') || '[]');


    existing.push({
      name,
      city,
      lat,
      lng,
      description
    });


    localStorage.setItem('locations', JSON.stringify(existing));


    alert('Location added!');
    window.location.href = 'index.html';
  });
</script>

</body>
</html>
